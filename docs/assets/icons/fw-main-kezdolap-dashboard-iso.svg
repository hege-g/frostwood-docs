<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="main-home-title main-home-desc">
  <title id="main-home-title">Frostwood fő blokk — Kezdőlap dashboard ikon</title>
  <desc id="main-home-desc">Izometrikus dashboard navigációs ikon a Kezdőlap kategóriához.</desc>
  <defs>
    <linearGradient id="main-home-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBFBFB"/>
      <stop offset="100%" stop-color="#EEF4FB"/>
    </linearGradient>
    <linearGradient id="main-home-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F9FB"/>
      <stop offset="100%" stop-color="#D8E2EC"/>
    </linearGradient>
    <linearGradient id="main-home-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D5DEE8"/>
      <stop offset="100%" stop-color="#C6D1DB"/>
    </linearGradient>
    <linearGradient id="main-home-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C6D1DB"/>
      <stop offset="100%" stop-color="#B2C0CD"/>
    </linearGradient>
    <linearGradient id="main-home-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#DCEBFA" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="main-home-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BFD8F2"/>
      <stop offset="100%" stop-color="#5A7FA6"/>
    </linearGradient>
    <linearGradient id="main-home-metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F7FA"/>
      <stop offset="100%" stop-color="#8D99A6"/>
    </linearGradient>
    <filter id="main-home-baseShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#8D99A6" flood-opacity="0.22"/>
    </filter>
    <filter id="main-home-objectShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#8D99A6" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="36" fill="url(#main-home-bg)"/>
  <g aria-hidden="true" opacity="0.13" fill="none" stroke="#8D99A6" stroke-width="2">
    <path d="M90 142 164 100 238 142 164 184Z"/>
    <path d="M164 184v70M90 142v70l74 42 74-42v-70"/>
    <path d="M292 100h94M292 124h68M292 148h86"/>
  </g>
  <ellipse cx="258" cy="394" rx="132" ry="32" fill="#8D99A6" opacity="0.18" aria-hidden="true"/>
  <g filter="url(#main-home-baseShadow)">
    <polygon points="110,314 258,250 406,314 258,380" fill="url(#main-home-top)" stroke="#415A70" stroke-width="3.5"/>
    <polygon points="110,314 110,362 258,428 258,380" fill="url(#main-home-left)" stroke="#415A70" stroke-width="3.5"/>
    <polygon points="258,380 258,428 406,362 406,314" fill="url(#main-home-right)" stroke="#415A70" stroke-width="3.5"/>
  </g>

  <g filter="url(#main-home-objectShadow)">
    <polygon points="144,166 318,126 380,226 206,268" fill="url(#main-home-glass)" stroke="#415A70" stroke-width="5"/>
    <polygon points="206,268 380,226 380,258 206,302" fill="#B2C0CD" stroke="#415A70" stroke-width="4"/>
    <polygon points="144,166 206,268 206,302 144,198" fill="#C6D1DB" stroke="#415A70" stroke-width="4"/>
    <path d="M178 190h94M172 216h82M166 242h102" stroke="#5A7FA6" stroke-width="9" stroke-linecap="round"/>
    <path d="M302 168a42 42 0 1 1-31 70l31-28z" fill="#E8A86A" stroke="#415A70" stroke-width="4"/>
    <path d="M302 168v42h42" fill="#7A8F82" stroke="#415A70" stroke-width="4"/>
    <rect x="160" y="274" width="58" height="30" rx="7" fill="#FFFFFF" stroke="#415A70" stroke-width="4"/>
    <rect x="236" y="256" width="58" height="30" rx="7" fill="#FFFFFF" stroke="#415A70" stroke-width="4"/>
    <rect x="312" y="238" width="58" height="30" rx="7" fill="#FFFFFF" stroke="#415A70" stroke-width="4"/>
