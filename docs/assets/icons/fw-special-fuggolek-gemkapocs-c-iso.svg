  <title id="gk-c-title">Frostwood izometrikus voxel gémkapocs ikon — C függelékjel</title>
  <desc id="gk-c-desc">Izometrikus, voxel-szerkezetű Frostwood gémkapocs ikon. A külső hurok fagyasztott üveghatású, a belső visszahajló rész matt világos anyagú. A jobb alsó sarokban C betűjelzés látható.</desc>
