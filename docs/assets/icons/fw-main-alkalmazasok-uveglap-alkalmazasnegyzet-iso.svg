    <linearGradient id="main-apps-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#DCEBFA" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="main-apps-blue" x1="0" y1="0" x2="1" y2="1">
