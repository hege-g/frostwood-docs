    <filter id="main-apps-baseShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#8D99A6" flood-opacity="0.22"/>
    </filter>
    <filter id="main-apps-objectShadow" x="-20%" y="-20%" width="140%" height="140%">
