<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="main-apps-title main-apps-desc">
  <title id="main-apps-title">Frostwood fő blokk — Alkalmazások app grid ikon</title>
  <desc id="main-apps-desc">Lebegő üveglapon elhelyezett alkalmazásrács navigációs ikon az Alkalmazások kategóriához.</desc>
  <defs>
    <linearGradient id="main-apps-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBFBFB"/>
      <stop offset="100%" stop-color="#EEF4FB"/>
    </linearGradient>
    <linearGradient id="main-apps-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F9FB"/>
      <stop offset="100%" stop-color="#D8E2EC"/>
    </linearGradient>
    <linearGradient id="main-apps-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D5DEE8"/>
      <stop offset="100%" stop-color="#C6D1DB"/>
    </linearGradient>
    <linearGradient id="main-apps-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C6D1DB"/>
      <stop offset="100%" stop-color="#B2C0CD"/>
