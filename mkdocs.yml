site_name: Frostwood Dokumentáció
site_description: Frostwood rendszer dokumentáció
site_url: "https://hege-g.github.io/frostwood-docs/"
repo_url: "https://github.com/hege-g/frostwood-docs"
repo_name: "hege-g/frostwood-docs"

theme:
  name: material
  custom_dir: overrides
  language: hu
  language_extensions:
    hu:
      search.reset: "Keresés törlése"
      search.share: "Keresési link másolása"

  features:
    # --- 1. Navigáció és Menürendszer ---
    - navigation.tabs          # Felső vízszintes menüfülek aktiválása
    - navigation.tabs.sticky   # A felső menüfülek fixen fent maradnak görgetéskor
    - navigation.sections      # Az oldalsó menücsoportok vizuális szekciókra bontása
    - navigation.top           # "Vissza a tetejére" lebegő gomb megjelenítése
    # - navigation.tracking      # Az oldalsó menü automatikusan követi a görgetést
    - navigation.footer        # Előző/Következő oldal léptető sáv a lap alján

    # --- 2. Intelligens Keresőrendszer ---
    - search.suggest           # Gépelés közbeni keresési javaslatok
    - search.highlight         # A talált szavak sárga kiemelése a dokumentumban
    - search.share             # Keresési kifejezést tartalmazó közvetlen link másolása

    # --- 3. Tartalmi és Kódblokk funkciók ---
    - content.code.copy        # Gyári másolás gomb a kódblokkok sarkában
    # - content.tooltips         # Modern buboréksúgók
    - announce.dismiss         # A felső bejelentési sáv bezárásának engedélyezése

    # --- 4. Tartalomjegyzék és Fejléc viselkedés ---
    # - toc.follow               # A jobb oldali tartalomjegyzék követi a görgetést
    # - toc.integrate            # Beolvasztja a tartalomjegyzéket az oldalsó menübe mobilon
    # - header.autohide          # Lefelé görgetéskor elrejti, felfelé görgetéskor mutatja a fő fejlécet

  palette:
    # --- VILÁGOS MÓD (Clean Paper) ---
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/cube
        name: Váltás sötét módra

    # --- SÖTÉT MÓD (Deep Obsidian) ---
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/cube-scan
        name: Váltás rendszer szerinti módra

    # --- RENDSZER MÓD (Automatikus) ---
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/cube-outline
        name: Váltás világos módra

plugins:
  - search

extra_css:
  - stylesheets/frostwood-visual-layer.css
  - stylesheets/frostwood-extra-icons.css
  - stylesheets/frostwood-components.css
  - stylesheets/frostwood-console.css
  - stylesheets/frostwood-embed.css
  - stylesheets/frostwood-admonitions.css
  - stylesheets/frostwood-wcag-toggle.css
  - stylesheets/frostwood-architecture-fixes.css

extra_javascript:
  - javascripts/frostwood-toggles.js
  - javascripts/frostwood-copy-region-fix.js

extra:
  generator: false

markdown_extensions:
  # 1. Alapvető MkDocs kiterjesztések
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false

  # 2. Összetett strukturális elemek
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # 3. Kódkiemelés és kódblokk menedzsment
  - pymdownx.highlight:
      anchor_linenums: false
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

  # 4. Felületi elemek és vizuális kiegészítők
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        attributes:
          aria-hidden: "true"
          focusable: "false"

